services:
  nginx:
    image: nginx:1.27-alpine
    container_name: blog_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - blog_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blog_php
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - blog_network

  mysql:
    image: mysql:8.0
    container_name: blog_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-blog}"
      MYSQL_USER: "${DB_USERNAME:-blog_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-blog_password}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_password}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog_network

volumes:
  mysql_data:

networks:
  blog_network:
    driver: bridge
